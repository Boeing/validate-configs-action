---
name: 'Validate Config Files Action'
author: 'Boeing'
description: 'Github Action to validate config files in a repo using the config-file-validator tool'

inputs:
  search-paths:
    description: 'A space separated list of directories or files to scan'
    required: false
    default: '.'
  exclude-dirs:
    description: 'A comma separated list of directories to exclude in the search path. Example: "subdir1,subdir2"'
    required: false
    default: ""
  exclude-file-types:
    description: 'A comma separated list of file types to exclude. Example: "csv,json"'
    required: false
    default: ""
  file-types:
    description: 'A comma separated list of file types to validate. Cannot be used with exclude-file-types. Example: "json,yaml"'
    required: false
    default: ""
  depth:
    description: 'An integer value limiting the depth of recursion for the search paths. For example, setting depth to 0 would disable recursion'
    required: false
    default: ""
  reporter:
    description: 'Comma separated list of report formats with optional output paths. Format: type:path. Options are standard, json, junit, sarif (default "standard")'
    required: false
    default: "standard"
  group-by:
    description: 'A comma separated list of how to group the output. Options are filetype, directory, or pass-fail.'
    required: false
    default: ""
  quiet:
    description: 'If set to true, suppresses all output to stdout'
    required: false
    default: "false"
  globbing:
    description: 'If set to true, enables glob pattern matching for search paths'
    required: false
    default: "false"
  require-schema:
    description: 'If set to true, fail validation for files that support schema validation but do not declare a schema'
    required: false
    default: "false"
  no-schema:
    description: 'If set to true, disable all schema validation. Only syntax is checked. Cannot be used with require-schema, schema-map, or schemastore'
    required: false
    default: "false"
  schemastore:
    description: 'If set to true, enables automatic schema lookup using the embedded SchemaStore catalog with remote fetching'
    required: false
    default: "false"
  schemastore-path:
    description: 'Path to a local SchemaStore clone for automatic schema lookup (implies schemastore). For air-gapped environments'
    required: false
    default: ""
  type-map:
    description: 'Comma separated list of glob pattern to file type mappings. Format: pattern:type. Example: "**/inventory:ini,**/*.cfg:json"'
    required: false
    default: ""
  schema-map:
    description: 'Comma separated list of glob pattern to schema file mappings. Format: pattern:schema_path. Example: "**/package.json:schemas/pkg.json,**/config.xml:schemas/config.xsd"'
    required: false
    default: ""
  gitignore:
    description: 'If set to true, skip files and directories matched by .gitignore patterns'
    required: false
    default: "false"
  only-changed:
    description: 'If set to true, only validate files changed in the current pull request'
    required: false
    default: "false"

outputs:
  files-validated:
    description: 'Total number of files scanned'
  files-failed:
    description: 'Number of files that failed validation'
  exit-code:
    description: 'Exit code from validation (0=success, 1=validation errors, 2=runtime error)'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.search-paths }}
    - ${{ inputs.exclude-dirs }}
    - ${{ inputs.exclude-file-types }}
    - ${{ inputs.file-types }}
    - ${{ inputs.depth }}
    - ${{ inputs.reporter }}
    - ${{ inputs.group-by }}
    - ${{ inputs.quiet }}
    - ${{ inputs.globbing }}
    - ${{ inputs.require-schema }}
    - ${{ inputs.no-schema }}
    - ${{ inputs.schemastore }}
    - ${{ inputs.schemastore-path }}
    - ${{ inputs.type-map }}
    - ${{ inputs.schema-map }}
    - ${{ inputs.gitignore }}
    - ${{ inputs.only-changed }}

branding:
  color: 'blue'
  icon: 'code'
